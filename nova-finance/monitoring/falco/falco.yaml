# Falco configuration for Nova Finance security monitoring

# File containing Falco rules
rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
  - /etc/falco/k8s_audit_rules.yaml
  - /etc/falco/application_rules.yaml

# Whether to load the kernel module
load_plugins: []

# Settings for syscall processing
syscall_event_drops:
  threshold: .1
  actions:
    - log
    - alert
  rate: .03333
  max_burst: 1000

# Falco outputs
stdout_output:
  enabled: true

syslog_output:
  enabled: true
  priority: LOG_WARNING

file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco_events.txt

# HTTP output for alerts
http_output:
  enabled: true
  url: "http://backend:8000/api/security/falco-alerts/"
  user_agent: "falcoagent"

# Program output
program_output:
  enabled: false
  keep_alive: false
  program: "jq '{text: .output}' | curl -d @- -X POST https://hooks.slack.com/services/XXX"

# Grpc output service
grpc_output:
  enabled: false

# gRPC server
grpc:
  enabled: false

# Webserver
webserver:
  enabled: true
  listen_port: 8765
  k8s_healthz_endpoint: /healthz
  ssl_enabled: false

# Base syscalls to never drop
base_syscalls:
  custom_set: []
  repair: false

# Log level
log_level: INFO

# Log stderr
log_stderr: true

# Log syslog
log_syslog: true

# Priority threshold
priority: debug

# Whether to buffer events
buffered_outputs: false

# Output format
outputs:
  rate: 1
  max_burst: 1000

syscall_event_timeouts:
  max_consecutives: 1000
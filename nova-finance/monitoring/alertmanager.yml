global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@nova-finance.com'
  smtp_auth_username: 'alerts@nova-finance.com'
  smtp_auth_password: 'alert-email-password'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
    continue: true
  - match:
      severity: warning
    receiver: 'warning-alerts'
    continue: true
  - match:
      alert_level: security
    receiver: 'security-team'
    continue: true

receivers:
- name: 'web.hook'
  webhook_configs:
  - url: 'http://backend:8000/api/monitoring/alerts/'
    http_config:
      basic_auth:
        username: 'monitoring'
        password: 'monitoring-webhook-password'

- name: 'critical-alerts'
  email_configs:
  - to: 'admin@nova-finance.com'
    subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
    body: |
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Instance: {{ .Labels.instance }}
      Severity: {{ .Labels.severity }}
      Time: {{ .StartsAt }}
      {{ end }}
  slack_configs:
  - api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'
    channel: '#alerts-critical'
    title: '🚨 Critical Alert - Nova Finance'
    text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    color: 'danger'

- name: 'warning-alerts'
  email_configs:
  - to: 'ops@nova-finance.com'
    subject: '⚠️  WARNING: {{ .GroupLabels.alertname }}'
    body: |
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Instance: {{ .Labels.instance }}
      Severity: {{ .Labels.severity }}
      Time: {{ .StartsAt }}
      {{ end }}
  slack_configs:
  - api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'
    channel: '#alerts-warning'
    title: '⚠️  Warning Alert - Nova Finance'
    text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    color: 'warning'

- name: 'security-team'
  email_configs:
  - to: 'security@nova-finance.com'
    subject: '🛡️ SECURITY ALERT: {{ .GroupLabels.alertname }}'
    body: |
      SECURITY INCIDENT DETECTED
      
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Instance: {{ .Labels.instance }}
      Time: {{ .StartsAt }}
      {{ end }}
      
      Please investigate immediately.
  slack_configs:
  - api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'
    channel: '#security-alerts'
    title: '🛡️ Security Alert - Nova Finance'
    text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    color: 'danger'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
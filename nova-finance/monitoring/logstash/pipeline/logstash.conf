input {
  file {
    path => "/usr/share/logstash/logs/*.log"
    start_position => "beginning"
    codec => "json"
    tags => ["nova-finance"]
  }
}

filter {
  # Parse Django logs
  if [logger_name] {
    mutate {
      add_field => { "service" => "django" }
    }
  }

  # Parse Nginx logs
  if [fields][log_type] == "nginx" {
    grok {
      match => { "message" => "%{NGINXACCESS}" }
    }
    mutate {
      add_field => { "service" => "nginx" }
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss,SSS" ]
  }

  # Add severity level
  if [level_name] == "ERROR" or [level_name] == "CRITICAL" {
    mutate {
      add_field => { "severity" => "high" }
    }
  } else if [level_name] == "WARNING" {
    mutate {
      add_field => { "severity" => "medium" }
    }
  } else {
    mutate {
      add_field => { "severity" => "low" }
    }
  }

  # Security event detection
  if [message] =~ /(?i)(failed login|unauthorized|suspicious|attack|breach|malware|phishing)/ {
    mutate {
      add_field => { "security_event" => "true" }
      add_field => { "alert_level" => "security" }
    }
  }

  # Performance monitoring
  if [response_time] and [response_time] > 2000 {
    mutate {
      add_field => { "performance_issue" => "slow_response" }
    }
  }

  # Financial transaction monitoring
  if [message] =~ /(?i)(payment|loan|transaction|settlement)/ {
    mutate {
      add_field => { "business_event" => "financial" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nova-finance-logs-%{+YYYY.MM.dd}"
  }

  # Send security events to separate index
  if [security_event] == "true" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "nova-finance-security-%{+YYYY.MM.dd}"
    }
  }

  # Send performance issues to monitoring
  if [performance_issue] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "nova-finance-performance-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => rubydebug }
}